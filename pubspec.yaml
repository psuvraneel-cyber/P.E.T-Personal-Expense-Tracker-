name: pet
description: "P.E.T - Personal Expense Tracker for Indian users"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path_provider: ^2.1.5
  path: ^1.9.1
  provider: ^6.1.4
  fl_chart: ^0.70.2
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
  flutter_slidable: ^3.1.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.5
  # Firebase + Google Sign-In
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  google_sign_in: ^6.2.2
  connectivity_plus: ^6.1.4
  # SMS Transaction Auto-Detection (Android only)
  telephony: ^0.2.0
  permission_handler: ^11.3.1
  workmanager: ^0.9.0+3
  crypto: ^3.0.6
  http: ^1.2.2
  pdf: ^3.11.3
  share_plus: ^12.0.1
  flutter_animate: ^4.5.0
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/app_icon.jpeg"
